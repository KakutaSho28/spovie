services:

  nginx:
    image: nginx:1.25-alpine
    container_name: spovie_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - react
    networks:
      - app_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: spovie_php
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - mysql
    networks:
      - app_network

  # FFmpeg切り抜きジョブを処理するキューワーカー
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: spovie_queue
    command: sh -c "until [ -f /var/www/backend/artisan ]; do sleep 5; done; php /var/www/backend/artisan queue:work --tries=1 --timeout=600"
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - mysql
      - php
    networks:
      - app_network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: spovie_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - app_network

  react:
    image: node:20-alpine
    container_name: spovie_react
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
